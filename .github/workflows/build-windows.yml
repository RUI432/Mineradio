name: Build Windows installer

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing GitHub Release tag to upload the installer to"
        required: true
        default: "v1.1.1"
      upload_to_release:
        description: "Upload the installer to the release tag above"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.7 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build installer
        run: pnpm exec electron-builder --win nsis --x64 --publish never

      - name: Locate installer
        id: installer
        shell: pwsh
        run: |
          $asset = Get-ChildItem -Path dist -Filter "Mineradio-*-Setup.exe" | Select-Object -First 1
          if (-not $asset) {
            throw "Windows installer was not generated."
          }
          "path=$($asset.FullName)" >> $env:GITHUB_OUTPUT
          "name=$($asset.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.installer.outputs.name }}
          path: ${{ steps.installer.outputs.path }}

      - name: Upload to GitHub Release
        if: ${{ inputs.upload_to_release }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.release_tag }}" "${{ steps.installer.outputs.path }}" --clobber
